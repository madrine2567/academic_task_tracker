services:
  - type: web
    name: asms-django
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn tracker_project.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://asms-django.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: asms-postgres
          property: connectionString

databases:
  - name: asms-postgres
    plan: free
