{% extends "base.html" %}
{% block title %}Delete Study Session{% endblock %}
{% block content %}
<div class="page-title"><h1 class="h4 mb-1">Delete Study Session</h1><p class="text-muted mb-0">Confirm removal of this study plan.</p></div>
<div class="card p-4">
  <p>Delete <strong>{{ session.subject }}</strong> scheduled for <strong>{{ session.study_date|date:"d M Y" }}</strong>?</p>
  <form method="post">{% csrf_token %}<button class="btn btn-danger" type="submit">Delete</button> <a class="btn btn-outline-secondary" href="{% url 'study_session_list' %}">Cancel</a></form>
</div>
{% endblock %}
