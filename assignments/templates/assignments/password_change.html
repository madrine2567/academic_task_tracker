{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="page-title"><h1 class="h4 mb-1">Change Password</h1><p class="text-muted mb-0">Update your account credentials securely.</p></div>
<div class="card p-4" style="max-width:640px">
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}<div class="text-danger text-small">{{ field.errors }}</div></div>{% endfor %}
    <button class="btn btn-primary" type="submit">Change Password</button>
    <a class="btn btn-outline-secondary" href="{% url 'profile' %}">Cancel</a>
  </form>
</div>
{% endblock %}
