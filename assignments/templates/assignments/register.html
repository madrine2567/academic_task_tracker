{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block auth_content %}
<div class="auth-bg d-flex align-items-center justify-content-center p-3">
  <div class="card p-4" style="max-width:760px;width:100%">
    <div class="mb-3"><h1 class="h4 mb-1">Create Student Account</h1><p class="text-muted mb-0">Register your ASMS profile.</p></div>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div class="row g-3">
        {% for field in form %}
        <div class="col-md-6"><label class="form-label">{{ field.label }}</label>{{ field }}<div class="text-danger text-small">{{ field.errors }}</div></div>
        {% endfor %}
      </div>
      <button class="btn btn-primary mt-3" type="submit">Create Account</button>
      <a class="btn btn-link mt-3" href="{% url 'login' %}">Back to login</a>
    </form>
  </div>
</div>
{% endblock %}
